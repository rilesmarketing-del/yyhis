<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>智慧医院管理系统 - PC信息架构页面</title>
  <style>
    :root {
      --bg: #f4f6f3;
      --panel: #ffffff;
      --ink: #1f2a2a;
      --sub: #526260;
      --line: #d9dfdc;
      --brand: #0f766e;
      --brand-2: #134e4a;
      --accent: #eab308;
      --patient: #0ea5a4;
      --doctor: #2563eb;
      --admin: #b45309;
      --ok: #166534;
      --shadow: 0 14px 32px rgba(20, 38, 35, 0.1);
      --radius: 14px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "IBM Plex Sans", "Noto Sans SC", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 8% 10%, #d9f4ef 0%, transparent 30%),
        radial-gradient(circle at 88% 20%, #fef3c7 0%, transparent 25%),
        radial-gradient(circle at 70% 85%, #dbeafe 0%, transparent 22%),
        var(--bg);
      min-height: 100vh;
    }

    .shell {
      width: min(1200px, 94vw);
      margin: 30px auto;
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(15, 118, 110, 0.15);
      border-radius: 20px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(4px);
      overflow: hidden;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 22px;
      background: linear-gradient(110deg, var(--brand-2), var(--brand));
      color: #f5fffd;
    }

    .title {
      margin: 0;
      font-size: 20px;
      letter-spacing: 0.2px;
    }

    .subtitle {
      margin: 4px 0 0;
      font-size: 13px;
      opacity: 0.9;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.16);
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #86efac;
      box-shadow: 0 0 10px rgba(134, 239, 172, 0.9);
    }

    .role-switch {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      background: #f8faf9;
    }

    .role-btn {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .role-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(31, 42, 42, 0.08);
    }

    .role-btn.active {
      border-color: transparent;
      color: #fff;
      font-weight: 600;
    }

    .role-btn[data-role="patient"].active { background: var(--patient); }
    .role-btn[data-role="doctor"].active { background: var(--doctor); }
    .role-btn[data-role="admin"].active { background: var(--admin); }

    .layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      min-height: 640px;
    }

    .left {
      border-right: 1px solid var(--line);
      background: #fcfdfc;
      padding: 14px 14px 18px;
      overflow: auto;
    }

    .right {
      padding: 20px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 12px;
    }

    .panel h3 {
      margin: 0 0 10px;
      font-size: 14px;
      color: #334443;
      letter-spacing: 0.3px;
    }

    .tree {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .node {
      border: 1px solid transparent;
      border-radius: 10px;
      margin-bottom: 6px;
      overflow: hidden;
      background: #fff;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .node:hover {
      border-color: #bfd6d2;
      box-shadow: 0 8px 16px rgba(15, 118, 110, 0.06);
    }

    .node-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      padding: 10px 11px;
      font-weight: 600;
      font-size: 14px;
    }

    .node-body {
      padding: 2px 10px 10px 18px;
      font-size: 13px;
      color: var(--sub);
    }

    .node-body div {
      position: relative;
      padding: 4px 0 4px 14px;
      cursor: pointer;
    }

    .node-body div::before {
      content: "";
      position: absolute;
      left: 0;
      top: 12px;
      width: 6px;
      height: 1px;
      background: #9db2ae;
    }

    .node-body div:hover {
      color: #1d4d47;
      font-weight: 500;
    }

    .chev {
      font-size: 12px;
      color: #7e8f8c;
      transition: transform 0.2s ease;
    }

    .node.collapsed .node-body {
      display: none;
    }

    .node.collapsed .chev {
      transform: rotate(-90deg);
    }

    .hero {
      background: linear-gradient(115deg, #ecfeff, #fffbeb 55%, #eff6ff);
      border: 1px solid #d8e6e2;
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 14px;
    }

    .hero h2 {
      margin: 0;
      font-size: 20px;
    }

    .hero p {
      margin: 8px 0 0;
      color: #4f5f5d;
      font-size: 14px;
      line-height: 1.55;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(2, minmax(200px, 1fr));
      gap: 12px;
    }

    .card {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 12px;
      padding: 12px;
      min-height: 102px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 18px rgba(17, 34, 32, 0.08);
    }

    .card h4 {
      margin: 0;
      font-size: 14px;
      color: #233231;
    }

    .path {
      margin-top: 8px;
      font-family: "IBM Plex Mono", "Cascadia Code", monospace;
      color: #5d706d;
      font-size: 12px;
    }

    .hint {
      margin-top: 6px;
      font-size: 12px;
      color: #70817f;
    }

    .footer {
      margin-top: 14px;
      font-size: 12px;
      color: #6a7b79;
      padding-top: 10px;
      border-top: 1px dashed #c8d4d1;
    }

    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
      .left { border-right: none; border-bottom: 1px solid var(--line); }
      .cards { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <h1 class="title">智慧医院管理系统（PC）</h1>
        <p class="subtitle">前端信息架构演示页 · 按角色拆分导航与核心页面层级</p>
      </div>
      <div class="badge"><span class="dot"></span> IA Ready</div>
    </header>

    <section class="role-switch" id="roleSwitch">
      <button class="role-btn active" data-role="patient">患者端</button>
      <button class="role-btn" data-role="doctor">医生端</button>
      <button class="role-btn" data-role="admin">管理员端</button>
    </section>

    <section class="layout">
      <aside class="left">
        <div class="panel">
          <h3>导航树</h3>
          <ul class="tree" id="tree"></ul>
        </div>
      </aside>

      <section class="right">
        <div class="hero">
          <h2 id="roleTitle">患者端（Patient Portal）</h2>
          <p id="roleDesc"></p>
        </div>

        <div class="cards" id="cards"></div>

        <div class="footer" id="summary"></div>
      </section>
    </section>
  </main>

  <script>
    const roleData = {
      patient: {
        title: "患者端（Patient Portal）",
        desc: "面向患者的PC门户，覆盖预约挂号、就诊记录、报告查询、处方查询与缴费中心。",
        modules: [
          { name: "工作台", path: "/patient/dashboard", children: ["今日预约", "待缴费", "最新报告"] },
          { name: "预约挂号", path: "/patient/appointments", children: ["医生排班查询", "新建预约", "我的预约", "退号/改约"] },
          { name: "就诊记录", path: "/patient/visits", children: ["门诊记录列表", "就诊详情"] },
          { name: "检验检查报告", path: "/patient/reports", children: ["报告列表", "报告详情/打印"] },
          { name: "处方与药品", path: "/patient/prescriptions", children: ["处方列表", "处方详情"] },
          { name: "缴费中心", path: "/patient/payments", children: ["待支付账单", "支付记录", "发票下载"] }
        ]
      },
      doctor: {
        title: "医生端（Doctor Portal）",
        desc: "面向医生的PC工作站，涵盖接诊流程、病历管理、医嘱处方、患者视图与排班协同。",
        modules: [
          { name: "医生工作台", path: "/doctor/dashboard", children: ["今日排班", "候诊队列", "待处理事项"] },
          { name: "门诊接诊", path: "/doctor/clinic", children: ["候诊列表", "接诊中", "已完成"] },
          { name: "病历管理", path: "/doctor/records", children: ["新建病历", "病历编辑", "病历归档查询"] },
          { name: "医嘱与处方", path: "/doctor/orders", children: ["开立处方", "检验检查申请", "历史医嘱查询"] },
          { name: "患者管理", path: "/doctor/patients", children: ["患者列表", "患者详情（历史就诊/过敏史/用药史）"] },
          { name: "我的排班", path: "/doctor/schedule", children: ["班次查看", "请假/调班申请"] }
        ]
      },
      admin: {
        title: "管理员端（Admin Portal）",
        desc: "面向医院管理与运维，提供运营总览、组织权限、排班号源、药房、结算和系统管理。",
        modules: [
          { name: "运营总览", path: "/admin/dashboard", children: ["挂号与接诊统计", "收费与医保统计", "药房库存预警"] },
          { name: "组织与人员", path: "/admin/org", children: ["科室管理", "医生/护士/职员管理", "患者账号管理"] },
          { name: "权限中心", path: "/admin/auth", children: ["角色管理", "菜单权限", "数据权限策略"] },
          { name: "排班与号源", path: "/admin/scheduling", children: ["排班配置", "号源规则", "停诊与调班处理"] },
          { name: "药房与库存", path: "/admin/pharmacy", children: ["药品目录", "库存管理", "出入库记录"] },
          { name: "收费与医保", path: "/admin/billing", children: ["收费项目配置", "医保对账", "异常账单处理"] },
          { name: "报表中心", path: "/admin/reports", children: ["业务报表", "财务报表", "导出下载"] },
          { name: "系统管理", path: "/admin/system", children: ["参数配置", "字典管理", "操作日志", "审计日志"] }
        ]
      }
    };

    const roleSwitch = document.getElementById("roleSwitch");
    const tree = document.getElementById("tree");
    const cards = document.getElementById("cards");
    const roleTitle = document.getElementById("roleTitle");
    const roleDesc = document.getElementById("roleDesc");
    const summary = document.getElementById("summary");

    let activeRole = "patient";

    function render(role) {
      const data = roleData[role];
      roleTitle.textContent = data.title;
      roleDesc.textContent = data.desc;

      tree.innerHTML = data.modules.map((m, index) => {
        const items = m.children.map((c) => `<div>${c}</div>`).join("");
        return `
          <li class="node ${index > 1 ? "collapsed" : ""}">
            <div class="node-head">
              <span>${m.name}</span>
              <span class="chev">▾</span>
            </div>
            <div class="node-body">${items}</div>
          </li>
        `;
      }).join("");

      cards.innerHTML = data.modules.map((m) => `
        <article class="card">
          <h4>${m.name}</h4>
          <div class="path">${m.path}</div>
          <div class="hint">子页面：${m.children.length} 个</div>
        </article>
      `).join("");

      const totalPages = data.modules.reduce((acc, m) => acc + m.children.length, 0) + data.modules.length;
      summary.textContent = `当前角色：${data.title} · 一级模块 ${data.modules.length} 个 · 核心页面节点 ${totalPages} 个（含一级与二级页面）`;

      bindTreeEvents();
    }

    function bindTreeEvents() {
      document.querySelectorAll(".node-head").forEach((head) => {
        head.onclick = () => head.parentElement.classList.toggle("collapsed");
      });
    }

    roleSwitch.addEventListener("click", (e) => {
      const btn = e.target.closest(".role-btn");
      if (!btn) return;
      activeRole = btn.dataset.role;
      document.querySelectorAll(".role-btn").forEach((b) => b.classList.remove("active"));
      btn.classList.add("active");
      render(activeRole);
    });

    render(activeRole);
  </script>
</body>
</html>
