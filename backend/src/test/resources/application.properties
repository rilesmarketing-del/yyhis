spring.main.banner-mode=off
spring.datasource.url=jdbc:h2:mem:patientapptest;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
demo.auth.token-hours=24
demo.seed.walkthrough-data=false
demo.migration.import-legacy-appointments=false
demo.migration.legacy-appointments-path=data/appointments.json
